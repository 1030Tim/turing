<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Record | JunOS</title>

<link rel="stylesheet" href="/static/style.css">

</head>


<body>


<header>

<h1>📝 JunOS Record Input</h1>

<p>捕捉當下狀態，不依靠記憶</p>

</header>



<div class="container">


<main>



<section class="hero">

<h2>新增紀錄</h2>

<p>
想到什麼就記錄，一天可以多筆。
</p>

</section>





<form action="/records/add" method="POST">





<div class="card">


<h3>📌 Record Type</h3>


<select name="type">


<option value="daily">
🌅 Daily State
</option>


<option value="training">
🏃 Training
</option>


<option value="coding">
💻 Coding
</option>


<option value="study">
📚 Study
</option>


<option value="music">
🎵 Music
</option>


<option value="emotion">
❤️ Emotion
</option>


<option value="reflection">
🧠 Reflection
</option>


<option value="research">
🔬 Research
</option>


</select>



</div>







<div class="card">


<h3>⚡ System State</h3>



<label>
😴 睡眠 Sleep (hours)
</label>


<br>


<input

type="number"

step="0.1"

name="sleep"

placeholder="例如 7.5"

>



<br><br>





<label>
🔋 能量 Energy (0-100)
</label>


<br>


<input

type="number"

name="energy"

min="0"

max="100"

placeholder="例如 80"

>



<br><br>





<label>
🎯 專注 Focus (0-100)
</label>


<br>


<input

type="number"

name="focus"

min="0"

max="100"

placeholder="例如 90"

>



<br><br>





<label>
😵 壓力 Stress (0-100)
</label>


<br>


<input

type="number"

name="stress"

min="0"

max="100"

placeholder="例如 30"

>



</div>







<div class="card">


<h3>🧠 Thought Log</h3>



<textarea

name="thoughts"

rows="8"

placeholder="
現在想到什麼？

例如：

今天寫 Flask + MongoDB
進入 coding flow

跳高訓練：
起跳速度不足

心理：
發現自己的壓力來源

">

</textarea>



</div>







<div class="card">


<h3>🎯 Performance</h3>



<label>

今日完成 Achievement

</label>


<br>



<textarea

name="achievement"

rows="5"

placeholder="
今天完成：

- MongoDB 部署成功
- 完成研究資料整理
- 訓練跳高

">

</textarea>





<br><br>





<label>

遇到問題 Problem

</label>


<br>



<textarea

name="problem"

rows="5"

placeholder="
今天卡在哪：

- 注意力下降
- Debug 太久
- 身體疲勞

">

</textarea>



</div>







<div class="card">


<h3>💡 Insight</h3>



<textarea

name="insight"

rows="5"

placeholder="
今天最大的理解：

例如：

MongoDB 比 SQLite 更適合非固定資料

或：

壓力不是問題，沒有輸出管道才是問題

">

</textarea>



</div>







<button type="submit">

保存紀錄

</button>





</form>





</main>


</div>





<footer>

JunOS v1.0

</footer>



<script src="/static/script.js"></script>



</body>


</html>
